<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GarageApp — Car Show Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #e31b23;
      --red-dark:   #b51219;
      --red-dim:    rgba(227, 27, 35, 0.15);
      --red-glow:   rgba(227, 27, 35, 0.35);
      --bg:         #0b0b0d;
      --surface:    #111113;
      --surface-2:  #18181b;
      --surface-3:  #1f1f23;
      --border:     rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --white:      #ffffff;
      --gray-1:     #f4f4f5;
      --gray-2:     #a1a1aa;
      --gray-3:     #71717a;
      --gray-4:     #3f3f46;
      --gray-5:     #27272a;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--gray-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 11, 13, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 28px;
      height: 68px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--red-glow);
    }

    .logo-mark svg { width: 20px; height: 20px; fill: white; }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.4px;
    }

    .logo-text span { color: var(--red); }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border-mid);
      margin: 0 4px;
    }

    .header-sub {
      font-size: 0.78rem;
      color: var(--gray-3);
      font-weight: 500;
    }

    .header-legend {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gray-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ld-judged { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }
    .ld-cruise { background: #e8e8e8; }
    .ld-other  { background: var(--gray-4); }

    /* ── Page layout ── */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }

    /* ── Month nav ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .cal-nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .month-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -1px;
      line-height: 1;
    }

    .month-event-count {
      font-size: 0.78rem;
      color: var(--gray-3);
      font-weight: 500;
      margin-top: 4px;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--gray-2);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .nav-btn:hover {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 10px var(--red-glow);
    }

    .nav-btn:active { transform: scale(0.95); }

    .today-btn {
      padding: 9px 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--gray-2);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .today-btn:hover {
      background: var(--red);
      border-color: var(--red);
      color: var(--white);
      box-shadow: 0 0 14px var(--red-glow);
    }

    .today-btn:active { transform: scale(0.97); }

    .cal-nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Day-of-week header ── */
    .dow-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }

    .dow-cell {
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-4);
      padding: 8px 0;
    }

    /* ── Day grid ── */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .day-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-height: 108px;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: default;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .day-cell.other-month {
      background: transparent;
      border-color: transparent;
    }

    .day-cell.other-month .day-num { color: var(--gray-5); }

    .day-cell.has-events {
      cursor: pointer;
    }

    .day-cell.has-events:hover {
      border-color: var(--border-mid);
      background: var(--surface-2);
    }

    .day-cell.today {
      border-color: var(--red) !important;
      background: var(--surface-2);
      box-shadow: 0 0 0 1px var(--red-glow), inset 0 0 24px rgba(227,27,35,0.05);
    }

    .day-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gray-3);
      line-height: 1;
      flex-shrink: 0;
    }

    .day-num-today {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--red);
      border-radius: 6px;
      color: var(--white);
      font-size: 0.78rem;
      font-weight: 800;
      box-shadow: 0 0 10px var(--red-glow);
    }

    /* ── Event pills ── */
    .event-pills {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-height: 0;
    }

    .event-pill {
      border-radius: 5px;
      padding: 3px 7px;
      font-size: 0.64rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.12s;
      line-height: 1.4;
    }

    .event-pill:hover {
      opacity: 0.82;
      transform: translateX(2px);
    }

    .pill-judged {
      background: rgba(227, 27, 35, 0.18);
      color: #ff8589;
      border-left: 2px solid var(--red);
    }

    .pill-cruise {
      background: rgba(255,255,255,0.07);
      color: #d4d4d8;
      border-left: 2px solid #71717a;
    }

    .pill-other {
      background: rgba(255,255,255,0.05);
      color: #a1a1aa;
      border-left: 2px solid #3f3f46;
    }

    .more-pill {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--gray-3);
      padding: 2px 6px;
      background: var(--surface-3);
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.12s, background 0.12s;
      align-self: flex-start;
    }

    .more-pill:hover {
      color: var(--red);
      background: var(--red-dim);
    }

    /* ── Event dot indicator (for cells with events) ── */
    .day-cell.has-events::after {
      content: '';
      position: absolute;
      bottom: 6px;
      right: 8px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red-glow);
      opacity: 0;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
      animation: modalIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      scrollbar-width: thin;
      scrollbar-color: var(--gray-5) transparent;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-top {
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-date-block {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .modal-date-num {
      font-size: 3rem;
      font-weight: 900;
      color: var(--red);
      line-height: 1;
      letter-spacing: -2px;
    }

    .modal-date-info { display: flex; flex-direction: column; gap: 2px; }

    .modal-date-day {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .modal-date-full {
      font-size: 0.74rem;
      color: var(--gray-3);
      font-weight: 500;
    }

    .modal-count-badge {
      padding: 3px 10px;
      background: var(--red-dim);
      border: 1px solid rgba(227, 27, 35, 0.3);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #ff8589;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      align-self: flex-start;
      margin-top: 2px;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--gray-3);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red);
    }

    .modal-events { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Event card in modal ── */
    .event-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .event-card:hover { border-color: var(--border-mid); }

    .event-card-stripe {
      height: 3px;
    }
    .stripe-judged { background: linear-gradient(90deg, var(--red), var(--red-dark)); }
    .stripe-cruise { background: #52525b; }
    .stripe-other  { background: #3f3f46; }

    .event-card-body { padding: 14px 16px 16px; }

    .event-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .event-card-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.35;
      letter-spacing: -0.2px;
    }

    .event-type-tag {
      flex-shrink: 0;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tag-judged {
      background: var(--red-dim);
      color: #ff8589;
      border: 1px solid rgba(227, 27, 35, 0.3);
    }

    .tag-cruise {
      background: rgba(255,255,255,0.06);
      color: var(--gray-2);
      border: 1px solid var(--border-mid);
    }

    .tag-other {
      background: rgba(255,255,255,0.04);
      color: var(--gray-3);
      border: 1px solid var(--border);
    }

    .event-card-meta {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
    }

    .meta-icon {
      width: 28px;
      height: 28px;
      background: var(--surface-3);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      flex-shrink: 0;
    }

    .meta-content { display: flex; flex-direction: column; gap: 1px; }
    .meta-label { font-size: 0.62rem; font-weight: 600; color: var(--gray-4); text-transform: uppercase; letter-spacing: 0.07em; }
    .meta-value { font-size: 0.8rem; font-weight: 500; color: var(--gray-1); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-5); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gray-4); }

    /* ── Red line accent at top ── */
    .red-accent-line {
      height: 2px;
      background: linear-gradient(90deg, var(--red) 0%, transparent 60%);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header-legend { display: none; }
      .month-title { font-size: 1.4rem; }
      .page { padding: 20px 14px 60px; }
      .day-cell { min-height: 76px; padding: 7px 6px; }
      .event-pill { font-size: 0.58rem; padding: 2px 5px; }
      .header-sub { display: none; }
      .header-divider { display: none; }
    }

    @media (max-width: 500px) {
      .day-cell { min-height: 60px; }
      .modal { border-radius: 12px; }
    }
  </style>
</head>

<!-- ── Header ── -->

      </svg>

    <div class="logo-text">Garage<span>App</span></div>

    <div class="header-legend">
      <div class="legend-item"><div class="legend-dot ld-judged"></div>Judged</div>

    </div>
  </div>
</header>

<!-- ── Calendar ── -->
<main class="page">

  <!-- Nav row -->
  <div class="cal-nav">
    <div class="cal-nav-left">
      <button class="nav-btn" id="prevBtn" aria-label="Previous month">&#8249;</button>
      <div>
        <div class="month-title" id="monthTitle"></div>
        <div class="month-event-count" id="monthCount"></div>
      </div>
      <button class="nav-btn" id="nextBtn" aria-label="Next month">&#8250;</button>
    </div>
    <div class="cal-nav-right">
      <button class="today-btn" id="todayBtn">Today</button>
    </div>
  </div>

  <!-- Day-of-week labels -->
  <div class="dow-header">
    <div class="dow-cell">Sun</div>
    <div class="dow-cell">Mon</div>
    <div class="dow-cell">Tue</div>
    <div class="dow-cell">Wed</div>
    <div class="dow-cell">Thu</div>
    <div class="dow-cell">Fri</div>
    <div class="dow-cell">Sat</div>
  </div>

  <!-- Day grid -->
  <div class="day-grid" id="dayGrid"></div>

</main>

<!-- ── Event modal ── -->
<div class="modal-overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-top">
      <div class="modal-date-block">
        <div class="modal-date-num" id="mNum"></div>
        <div class="modal-date-info">
          <div class="modal-date-day" id="mDay"></div>
          <div class="modal-date-full" id="mFull"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-top:2px;">
        <div class="modal-count-badge" id="mBadge"></div>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
    </div>
    <div class="modal-events" id="modalEvents"></div>
  </div>
</div>

// ─────────────────────────────────────────────
//  Index by date
// ─────────────────────────────────────────────
const byDate = {};
EVENTS.forEach(ev => {
  (byDate[ev.date] = byDate[ev.date] || []).push(ev);
});

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
const TODAY = new Date();
let cur = { year: TODAY.getFullYear(), month: TODAY.getMonth() };

const MONTHS      = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_SHORT  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYS_FULL   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function dKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// ─────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────
function render() {
  const { year, month } = cur;
  const firstDay     = new Date(year, month, 1).getDay();
  const daysInMonth  = new Date(year, month + 1, 0).getDate();
  const daysInPrev   = new Date(year, month, 0).getDate();

  // Count events this month
  let total = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    total += (byDate[dKey(year, month, d)] || []).length;
  }

  document.getElementById('monthTitle').textContent = `${MONTHS[month]} ${year}`;
  document.getElementById('monthCount').textContent  =
    total > 0 ? `${total} event${total !== 1 ? 's' : ''} this month` : 'No events this month';

  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';

  // Leading
  for (let i = firstDay - 1; i >= 0; i--) {
    grid.appendChild(buildCell(year, month - 1, daysInPrev - i, true));
  }
  // Current
  for (let d = 1; d <= daysInMonth; d++) {
    grid.appendChild(buildCell(year, month, d, false));
  }
  // Trailing
  const used = firstDay + daysInMonth;
  const tail = used % 7 === 0 ? 0 : 7 - (used % 7);
  for (let i = 1; i <= tail; i++) {
    grid.appendChild(buildCell(year, month + 1, i, true));
  }
}

function buildCell(year, month, day, other) {
  const norm   = new Date(year, month, day);
  const y = norm.getFullYear(), m = norm.getMonth(), d = norm.getDate();
  const key    = dKey(y, m, d);
  const events = byDate[key] || [];
  const isToday = d === TODAY.getDate() && m === TODAY.getMonth() && y === TODAY.getFullYear();

  const cell = document.createElement('div');
  cell.className = ['day-cell',
    other         ? 'other-month' : '',
    isToday       ? 'today'       : '',
    (!other && events.length) ? 'has-events' : ''
  ].filter(Boolean).join(' ');

  // Day number
  const numEl = document.createElement('div');
  numEl.className = 'day-num';
  if (isToday) {
    const pip = document.createElement('span');
    pip.className = 'day-num-today';
    pip.textContent = d;
    numEl.appendChild(pip);
  } else {
    numEl.textContent = d;
  }
  cell.appendChild(numEl);

  // Events
  if (!other && events.length) {
    const MAX = 3;
    const pillBox = document.createElement('div');
    pillBox.className = 'event-pills';

    events.slice(0, MAX).forEach(ev => {
      const p = document.createElement('div');
      p.className = `event-pill pill-${ev.type.toLowerCase()}`;
      p.textContent = ev.name;
      p.title = `${ev.name} · ${ev.time} · ${ev.city}, ${ev.state}`;
      p.addEventListener('click', e => { e.stopPropagation(); openModal(key); });
      pillBox.appendChild(p);
    });

    if (events.length > MAX) {
      const more = document.createElement('div');
      more.className = 'more-pill';
      more.textContent = `+${events.length - MAX} more`;
      more.addEventListener('click', e => { e.stopPropagation(); openModal(key); });
      pillBox.appendChild(more);
    }

    cell.appendChild(pillBox);
    cell.addEventListener('click', () => openModal(key));
  }

  return cell;
}

// ─────────────────────────────────────────────
//  Modal
// ─────────────────────────────────────────────
function openModal(key) {
  const events = byDate[key] || [];
  if (!events.length) return;

  const dt = new Date(key + 'T12:00:00');
  document.getElementById('mNum').textContent  = dt.getDate();
  document.getElementById('mDay').textContent  = DAYS_FULL[dt.getDay()];
  document.getElementById('mFull').textContent = `${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  document.getElementById('mBadge').textContent =
    `${events.length} Event${events.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('modalEvents');
  container.innerHTML = '';

  events.forEach(ev => {
    const t = ev.type.toLowerCase();
    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <div class="event-card-stripe stripe-${t}"></div>
      <div class="event-card-body">
        <div class="event-card-head">
          <div class="event-card-name">${ev.name}</div>
          <span class="event-type-tag tag-${t}">${ev.type}</span>
        </div>
        <div class="event-card-meta">
          <div class="meta-row">
            <div class="meta-icon">🕐</div>
            <div class="meta-content">
              <div class="meta-label">Time</div>
              <div class="meta-value">${ev.time}</div>
            </div>
          </div>
          <div class="meta-row">
            <div class="meta-icon">📍</div>
            <div class="meta-content">
              <div class="meta-label">Location</div>
              <div class="meta-value">${ev.city}, ${ev.state}</div>
            </div>
          </div>
          <div class="meta-row">
            <div class="meta-icon">📅</div>
            <div class="meta-content">
              <div class="meta-label">Date</div>
              <div class="meta-value">${DAYS_FULL[dt.getDay()]}, ${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}</div>
            </div>
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  });

  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

// ─────────────────────────────────────────────
//  Controls
// ─────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click', () => {
  if (--cur.month < 0) { cur.month = 11; cur.year--; }
  render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (++cur.month > 11) { cur.month = 0; cur.year++; }
  render();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  cur = { year: TODAY.getFullYear(), month: TODAY.getMonth() };
  render();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft')  document.getElementById('prevBtn').click();
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
});

render();
</script>
