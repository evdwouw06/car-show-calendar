<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GarageApp — Car Show Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       RESET & CUSTOM PROPERTIES
    ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:         #e31b23;
      --red-dark:    #b51219;
      --red-dim:     rgba(227,27,35,0.14);
      --red-glow:    rgba(227,27,35,0.32);
      --red-border:  rgba(227,27,35,0.45);
      --bg:          #0b0b0d;
      --surface:     #111113;
      --surface-2:   #18181b;
      --surface-3:   #1f1f23;
      --surface-4:   #27272a;
      --border:      rgba(255,255,255,0.06);
      --border-mid:  rgba(255,255,255,0.11);
      --border-hi:   rgba(255,255,255,0.18);
      --white:       #ffffff;
      --gray-1:      #f4f4f5;
      --gray-2:      #a1a1aa;
      --gray-3:      #71717a;
      --gray-4:      #52525b;
      --gray-5:      #3f3f46;
      --gray-6:      #27272a;
      --attending:   #22c55e;
      --maybe:       #f59e0b;
      --not-going:   #ef4444;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--gray-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    .header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(11,11,13,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      height: 62px;
      display: flex; align-items: center; gap: 16px;
    }

    .logo-img {
      height: 38px; width: 38px;
      border-radius: 9px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.05rem; font-weight: 800;
      color: var(--white); letter-spacing: -0.3px;
    }
    .brand-name span { color: var(--red); }

    .header-divider { width: 1px; height: 22px; background: var(--border-mid); }

    .header-page-title {
      font-size: 0.8rem; font-weight: 600;
      color: var(--gray-3); letter-spacing: 0.02em;
    }

    /* Search */
    .header-search-wrap {
      margin-left: auto;
      position: relative;
      display: flex; align-items: center;
    }

    .search-icon {
      position: absolute; left: 10px;
      color: var(--gray-4); font-size: 0.85rem; pointer-events: none;
    }

    #searchInput {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--gray-1);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 7px 12px 7px 30px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s, width 0.2s;
    }

    #searchInput::placeholder { color: var(--gray-4); }
    #searchInput:focus { border-color: var(--border-hi); width: 280px; }

    .header-actions { display: flex; align-items: center; gap: 8px; margin-left: 12px; }

    /* Filter bar */
    .filter-bar {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px 10px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.68rem; font-weight: 700; color: var(--gray-4);
      text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px;
    }

    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--gray-3);
      font-family: inherit; font-size: 0.72rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }

    .filter-btn:hover { border-color: var(--border-mid); color: var(--gray-1); }

    .filter-btn.active {
      background: var(--red-dim);
      border-color: var(--red-border);
      color: var(--white);
    }

    .filter-btn .dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }

    .filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

    /* Type filters */
    .filter-btn.f-judged.active { background: rgba(227,27,35,0.15); border-color: var(--red-border); }
    .filter-btn.f-cruise.active { background: rgba(255,255,255,0.07); border-color: var(--border-hi); }
    .filter-btn.f-other.active  { background: rgba(113,113,122,0.2); border-color: var(--gray-4); }

    /* ═══════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════ */
    .page { max-width: 1400px; margin: 0 auto; padding: 24px 24px 80px; }

    /* ═══════════════════════════════════════
       MONTH NAVIGATION
    ═══════════════════════════════════════ */
    .cal-nav {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .cal-nav-left { display: flex; align-items: center; gap: 14px; }

    .month-heading {
      font-size: 1.9rem; font-weight: 900;
      color: var(--white); letter-spacing: -1px; line-height: 1;
    }

    .month-meta { font-size: 0.75rem; color: var(--gray-3); margin-top: 4px; font-weight: 500; }

    .nav-btn {
      width: 38px; height: 38px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--gray-3);
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .nav-btn:hover {
      background: var(--red-dim); border-color: var(--red-border);
      color: var(--red); box-shadow: 0 0 12px var(--red-glow);
    }

    .today-btn {
      padding: 8px 16px; border-radius: 9px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--gray-2); font-family: inherit; font-size: 0.78rem;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }

    .today-btn:hover {
      background: var(--red); border-color: var(--red);
      color: var(--white); box-shadow: 0 0 14px var(--red-glow);
    }

    /* ═══════════════════════════════════════
       CALENDAR GRID
    ═══════════════════════════════════════ */
    .dow-row {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
      margin-bottom: 3px;
    }

    .dow-cell {
      text-align: center; font-size: 0.65rem; font-weight: 700;
      color: var(--gray-5); text-transform: uppercase;
      letter-spacing: 0.12em; padding: 7px 0;
    }

    .day-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }

    /* ── Day Cell ── */
    .day-cell {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; min-height: 112px;
      padding: 9px 9px 7px; display: flex; flex-direction: column; gap: 4px;
      position: relative; overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }

    .day-cell.other-month {
      background: transparent; border-color: transparent;
    }

    .day-cell.has-events { cursor: pointer; }
    .day-cell.has-events:hover { border-color: var(--border-mid); background: var(--surface-2); }

    .day-cell.today {
      border-color: var(--red) !important;
      background: var(--surface-2);
      box-shadow: 0 0 0 1px var(--red-glow), inset 0 0 30px rgba(227,27,35,0.04);
    }

    .day-num {
      font-size: 0.78rem; font-weight: 700; color: var(--gray-4);
      line-height: 1; flex-shrink: 0;
    }

    .day-num-today {
      display: inline-flex; align-items: center; justify-content: center;
      width: 23px; height: 23px;
      background: var(--red); border-radius: 6px;
      color: var(--white); font-size: 0.75rem; font-weight: 800;
      box-shadow: 0 0 10px var(--red-glow);
    }

    .other-month .day-num { color: var(--gray-6); }

    /* ── Event Pills ── */
    .event-pills { display: flex; flex-direction: column; gap: 2px; flex: 1; min-height: 0; }

    .event-pill {
      border-radius: 4px; padding: 2px 6px;
      font-size: 0.62rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; line-height: 1.45;
      transition: opacity 0.12s, transform 0.1s;
      display: flex; align-items: center; gap: 4px;
    }

    .event-pill:hover { opacity: 0.78; transform: translateX(2px); }

    /* type colors */
    .pill-judged { background: rgba(227,27,35,0.16); color: #fca5a5; border-left: 2px solid var(--red); }
    .pill-cruise { background: rgba(255,255,255,0.06); color: #d4d4d8; border-left: 2px solid #52525b; }
    .pill-other  { background: rgba(255,255,255,0.04); color: #a1a1aa; border-left: 2px solid #3f3f46; }

    /* attendance dot on pill */
    .pill-att-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    }
    .att-attending .pill-att-dot  { background: var(--attending); }
    .att-maybe .pill-att-dot      { background: var(--maybe); }
    .att-not .pill-att-dot        { background: var(--not-going); }

    .more-pill {
      font-size: 0.6rem; font-weight: 600; color: var(--gray-4);
      padding: 1px 5px; background: var(--surface-3); border-radius: 3px;
      cursor: pointer; align-self: flex-start;
      transition: color 0.12s, background 0.12s;
    }

    .more-pill:hover { color: var(--red); background: var(--red-dim); }

    /* ═══════════════════════════════════════
       MODAL / DETAIL PANEL
    ═══════════════════════════════════════ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 500; align-items: flex-end; justify-content: flex-end;
      padding: 16px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 16px;
      width: 460px; max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      box-shadow: -8px 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
      scrollbar-width: thin; scrollbar-color: var(--gray-6) transparent;
      display: flex; flex-direction: column;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(24px) scale(0.97); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }

    /* Modal header */
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }

    .modal-date-block { display: flex; align-items: center; gap: 12px; }

    .modal-date-num {
      font-size: 2.8rem; font-weight: 900; color: var(--red);
      letter-spacing: -3px; line-height: 1;
    }

    .modal-date-text { display: flex; flex-direction: column; gap: 2px; }

    .modal-date-dow {
      font-size: 0.9rem; font-weight: 700; color: var(--white); letter-spacing: -0.2px;
    }

    .modal-date-full { font-size: 0.72rem; color: var(--gray-3); font-weight: 500; }

    .modal-header-right { display: flex; align-items: flex-start; gap: 8px; flex-shrink: 0; }

    .modal-event-count {
      padding: 3px 9px; background: var(--red-dim); border: 1px solid var(--red-border);
      border-radius: 20px; font-size: 0.67rem; font-weight: 700;
      color: #fca5a5; text-transform: uppercase; letter-spacing: 0.07em;
      white-space: nowrap; margin-top: 3px;
    }

    .modal-close {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--surface-3); border: 1px solid var(--border);
      color: var(--gray-3); cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover { background: var(--red-dim); border-color: var(--red-border); color: var(--red); }

    /* Modal body */
    .modal-body { padding: 14px 20px 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; }

    /* Event card */
    .event-card {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: border-color 0.15s;
    }

    .event-card-accent { height: 3px; }
    .accent-judged { background: linear-gradient(90deg, var(--red), var(--red-dark)); }
    .accent-cruise { background: #3f3f46; }
    .accent-other  { background: #27272a; }

    .event-card-inner { padding: 13px 15px 15px; }

    .event-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px; margin-bottom: 10px;
    }

    .event-card-name {
      font-size: 0.92rem; font-weight: 700; color: var(--white);
      line-height: 1.35; letter-spacing: -0.2px;
    }

    .event-type-chip {
      flex-shrink: 0; padding: 2px 8px; border-radius: 20px;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .chip-judged { background: var(--red-dim); color: #fca5a5; border: 1px solid var(--red-border); }
    .chip-cruise { background: rgba(255,255,255,0.05); color: var(--gray-2); border: 1px solid var(--border-mid); }
    .chip-other  { background: rgba(255,255,255,0.03); color: var(--gray-3); border: 1px solid var(--border); }

    /* Meta rows */
    .event-meta { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

    .meta-row { display: flex; align-items: flex-start; gap: 9px; }

    .meta-icon {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--surface-3); display: flex; align-items: center;
      justify-content: center; font-size: 0.78rem; flex-shrink: 0;
    }

    .meta-text { display: flex; flex-direction: column; gap: 1px; padding-top: 1px; }

    .meta-label { font-size: 0.6rem; font-weight: 700; color: var(--gray-5); text-transform: uppercase; letter-spacing: 0.08em; }

    .meta-value { font-size: 0.77rem; font-weight: 500; color: var(--gray-1); line-height: 1.3; }

    .source-link {
      font-size: 0.75rem; color: var(--red); text-decoration: none; font-weight: 500;
      display: inline-flex; align-items: center; gap: 4px;
    }

    .source-link:hover { text-decoration: underline; }

    /* ── ATTENDANCE CONTROLS ── */
    .attendance-section {
      border-top: 1px solid var(--border);
      padding-top: 12px; margin-top: 2px;
    }

    .attendance-label {
      font-size: 0.65rem; font-weight: 700; color: var(--gray-4);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .attendance-btns { display: flex; gap: 6px; flex-wrap: wrap; }

    .att-btn {
      flex: 1; min-width: 70px;
      padding: 7px 6px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-3);
      color: var(--gray-3); font-family: inherit;
      font-size: 0.68rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .att-btn:hover { border-color: var(--border-hi); color: var(--gray-1); }

    .att-btn.active-attending {
      background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.5);
      color: #86efac;
      box-shadow: 0 0 10px rgba(34,197,94,0.2);
    }

    .att-btn.active-maybe {
      background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.5);
      color: #fcd34d;
      box-shadow: 0 0 10px rgba(245,158,11,0.15);
    }

    .att-btn.active-not {
      background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4);
      color: #fca5a5;
    }

    .att-icon { font-size: 0.9rem; }

    /* ═══════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════ */
    .no-events-month {
      grid-column: 1/-1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 300px; gap: 12px;
      color: var(--gray-5); font-size: 0.85rem;
    }

    .no-events-month .icon { font-size: 2.5rem; }

    /* ═══════════════════════════════════════
       LEGEND (bottom of header)
    ═══════════════════════════════════════ */
    .legend-row {
      display: flex; align-items: center; gap: 14px; margin-left: auto;
    }

    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.68rem; font-weight: 600; color: var(--gray-4);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
    .ld-j { background: var(--red); box-shadow: 0 0 5px var(--red-glow); }
    .ld-c { background: #52525b; }
    .ld-o { background: #3f3f46; }

    /* ═══════════════════════════════════════
       TOP RED STRIPE
    ═══════════════════════════════════════ */
    .top-stripe {
      height: 2px;
      background: linear-gradient(90deg, var(--red) 0%, rgba(227,27,35,0.3) 50%, transparent 100%);
    }

    /* ═══════════════════════════════════════
       SEARCH RESULTS BANNER
    ═══════════════════════════════════════ */
    .search-banner {
      background: var(--red-dim); border: 1px solid var(--red-border);
      border-radius: 8px; padding: 9px 14px;
      font-size: 0.78rem; color: #fca5a5; font-weight: 500;
      margin-bottom: 16px; display: none;
      align-items: center; justify-content: space-between; gap: 8px;
    }

    .search-banner.visible { display: flex; }

    .clear-search {
      background: none; border: none; color: var(--red); cursor: pointer;
      font-size: 0.72rem; font-weight: 700; font-family: inherit;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ═══════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════ */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-6); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gray-5); }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 900px) {
      .modal { width: 100%; max-width: 100%; border-radius: 16px 16px 0 0; }
      .modal-overlay { align-items: flex-end; justify-content: center; padding: 0; }
      .legend-row { display: none; }
      #searchInput { width: 160px; }
      #searchInput:focus { width: 200px; }
    }

    @media (max-width: 640px) {
      .day-cell { min-height: 72px; padding: 6px 5px; }
      .event-pill { font-size: 0.58rem; }
      .month-heading { font-size: 1.35rem; }
      .page { padding: 16px 12px 60px; }
      .header-page-title, .header-divider { display: none; }
      .filter-bar { padding-bottom: 8px; }
    }
  </style>
</head>
<body>

<div class="top-stripe"></div>

<!-- ══════════ HEADER ══════════ -->

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const TODAY = new Date();
let cur    = { year: TODAY.getFullYear(), month: TODAY.getMonth() };
let attFilter  = 'all';   // all | attending | maybe | not
let typeFilter = null;    // null | 'Judged' | 'Cruise' | 'Other'
let searchQ    = '';

// LocalStorage for attendance
const ATT_KEY = 'garageapp_attendance';
let attendance = {};
try { attendance = JSON.parse(localStorage.getItem(ATT_KEY) || '{}'); } catch(e) {}

function saveAtt() { localStorage.setItem(ATT_KEY, JSON.stringify(attendance)); }

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
const MONTHS    = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_S  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function dKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// Build lookup: dateKey → [events]
const byDate = {};
EVENTS.forEach(ev => {
  (byDate[ev.date] = byDate[ev.date] || []).push(ev);
});

function getAtt(id) { return attendance[id] || 'none'; }

function visibleEvents(events) {
  return events.filter(ev => {
    const a = getAtt(ev.id);
    if (attFilter === 'attending' && a !== 'attending') return false;
    if (attFilter === 'maybe'     && a !== 'maybe')     return false;
    if (attFilter === 'not'       && a !== 'not')       return false;
    if (typeFilter && ev.type !== typeFilter) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return ev.name.toLowerCase().includes(q) ||
             ev.city.toLowerCase().includes(q) ||
             ev.state.toLowerCase().includes(q) ||
             (ev.venue||'').toLowerCase().includes(q);
    }
    return true;
  });
}

/* ═══════════════════════════════════════════════════
   RENDER CALENDAR
═══════════════════════════════════════════════════ */
function render() {
  const { year, month } = cur;
  const firstDay    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();

  // Count visible events this month
  let total = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const evs = byDate[dKey(year, month, d)] || [];
    total += visibleEvents(evs).length;
  }

  document.getElementById('monthHeading').textContent = `${MONTHS[month]} ${year}`;
  document.getElementById('monthMeta').textContent =
    total > 0 ? `${total} event${total !== 1 ? 's' : ''} this month` : 'No events this month';

  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';

  for (let i = firstDay - 1; i >= 0; i--)
    grid.appendChild(buildCell(year, month - 1, daysInPrev - i, true));

  for (let d = 1; d <= daysInMonth; d++)
    grid.appendChild(buildCell(year, month, d, false));

  const used  = firstDay + daysInMonth;
  const trail = used % 7 === 0 ? 0 : 7 - (used % 7);
  for (let i = 1; i <= trail; i++)
    grid.appendChild(buildCell(year, month + 1, i, true));
}

function buildCell(year, month, day, other) {
  const norm = new Date(year, month, day);
  const y = norm.getFullYear(), m = norm.getMonth(), d = norm.getDate();
  const key  = dKey(y, m, d);
  const all  = byDate[key] || [];
  const evs  = other ? [] : visibleEvents(all);
  const isToday = d === TODAY.getDate() && m === TODAY.getMonth() && y === TODAY.getFullYear();

  const cell = document.createElement('div');
  cell.className = ['day-cell',
    other         ? 'other-month' : '',
    isToday       ? 'today'       : '',
    (!other && evs.length > 0) ? 'has-events' : ''
  ].filter(Boolean).join(' ');

  // Day number
  const numEl = document.createElement('div');
  numEl.className = 'day-num';
  if (isToday) {
    const pip = document.createElement('span');
    pip.className = 'day-num-today';
    pip.textContent = d;
    numEl.appendChild(pip);
  } else {
    numEl.textContent = d;
  }
  cell.appendChild(numEl);

  if (!other && evs.length > 0) {
    const MAX = 3;
    const pillBox = document.createElement('div');
    pillBox.className = 'event-pills';

    evs.slice(0, MAX).forEach(ev => {
      const a   = getAtt(ev.id);
      const p   = document.createElement('div');
      p.className = `event-pill pill-${ev.type.toLowerCase()}${a !== 'none' ? ' att-'+a : ''}`;
      p.title = `${ev.name} · ${ev.time} · ${ev.city}, ${ev.state}`;

      // Attendance dot
      if (a !== 'none') {
        const dot = document.createElement('span');
        dot.className = 'pill-att-dot';
        p.appendChild(dot);
      }

      const txt = document.createElement('span');
      txt.textContent = ev.name;
      p.appendChild(txt);

      p.addEventListener('click', e => { e.stopPropagation(); openModal(key); });
      pillBox.appendChild(p);
    });

    if (evs.length > MAX) {
      const more = document.createElement('div');
      more.className = 'more-pill';
      more.textContent = `+${evs.length - MAX} more`;
      more.addEventListener('click', e => { e.stopPropagation(); openModal(key); });
      pillBox.appendChild(more);
    }

    cell.appendChild(pillBox);
    cell.addEventListener('click', () => openModal(key));
  }

  return cell;
}

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
function openModal(key) {
  const all = byDate[key] || [];
  const evs = visibleEvents(all);
  if (!evs.length) return;

  const dt = new Date(key + 'T12:00:00');
  document.getElementById('mNum').textContent  = dt.getDate();
  document.getElementById('mDow').textContent  = DAYS_FULL[dt.getDay()];
  document.getElementById('mFull').textContent = `${MONTHS_S[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  document.getElementById('mCount').textContent = `${evs.length} Event${evs.length !== 1 ? 's' : ''}`;

  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  evs.forEach(ev => {
    const t = ev.type.toLowerCase();
    const a = getAtt(ev.id);

    const card = document.createElement('div');
    card.className = 'event-card';
    card.id = `card-${ev.id}`;

    const multiDay = ev.endDate && ev.endDate !== ev.date;
    const dateStr  = multiDay
      ? `${formatDateShort(ev.date)} – ${formatDateShort(ev.endDate)}`
      : `${DAYS_FULL[dt.getDay()]}, ${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;

    card.innerHTML = `
      <div class="event-card-accent accent-${t}"></div>
      <div class="event-card-inner">
        <div class="event-card-top">
          <div class="event-card-name">${ev.name}</div>
          <span class="event-type-chip chip-${t}">${ev.type}</span>
        </div>
        <div class="event-meta">
          <div class="meta-row">
            <div class="meta-icon">📅</div>
            <div class="meta-text">
              <div class="meta-label">Date</div>
              <div class="meta-value">${dateStr}</div>
            </div>
          </div>
          <div class="meta-row">
            <div class="meta-icon">🕐</div>
            <div class="meta-text">
              <div class="meta-label">Time</div>
              <div class="meta-value">${ev.time}${multiDay ? ' (start)' : ''}</div>
            </div>
          </div>
          <div class="meta-row">
            <div class="meta-icon">📍</div>
            <div class="meta-text">
              <div class="meta-label">Location</div>
              <div class="meta-value">${ev.venue ? ev.venue + ' · ' : ''}${ev.city}, ${ev.state}</div>
            </div>
          </div>
          ${ev.description ? `
          <div class="meta-row">
            <div class="meta-icon">📝</div>
            <div class="meta-text">
              <div class="meta-label">About</div>
              <div class="meta-value">${ev.description}</div>
            </div>
          </div>` : ''}
          ${ev.admission ? `
          <div class="meta-row">
            <div class="meta-icon">🎟️</div>
            <div class="meta-text">
              <div class="meta-label">Admission</div>
              <div class="meta-value">${ev.admission}</div>
            </div>
          </div>` : ''}
          <div class="meta-row">
            <div class="meta-icon">🔗</div>
            <div class="meta-text">
              <div class="meta-label">Source</div>
              <div class="meta-value">
                <a class="source-link" href="${ev.url}" target="_blank" rel="noopener">
                  ${ev.source} ↗
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Attendance -->
        <div class="attendance-section">
          <div class="attendance-label">Your Status</div>
          <div class="attendance-btns">
            <button class="att-btn${a==='attending'?' active-attending':''}" data-id="${ev.id}" data-val="attending">
              <span class="att-icon">✓</span> Going
            </button>
            <button class="att-btn${a==='maybe'?' active-maybe':''}" data-id="${ev.id}" data-val="maybe">
              <span class="att-icon">★</span> Interested
            </button>
            <button class="att-btn${a==='not'?' active-not':''}" data-id="${ev.id}" data-val="not">
              <span class="att-icon">✕</span> Can't Go
            </button>
          </div>
        </div>
      </div>`;

    body.appendChild(card);
  });

  // Attendance button handlers
  body.querySelectorAll('.att-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id  = btn.dataset.id;
      const val = btn.dataset.val;
      const cur = getAtt(id);

      // Toggle off if already selected
      if (cur === val) {
        delete attendance[id];
      } else {
        attendance[id] = val;
      }
      saveAtt();

      // Refresh card
      const cardEl = document.getElementById(`card-${id}`);
      const a2 = getAtt(id);
      cardEl.querySelectorAll('.att-btn').forEach(b => {
        b.className = 'att-btn';
        if (b.dataset.val === a2) {
          b.classList.add(`active-${a2}`);
        }
      });

      render(); // refresh calendar indicators
    });
  });

  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return `${MONTHS_S[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ═══════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════ */
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = e.target.value.trim();
    updateSearchBanner();
    render();
    if (searchQ) jumpToFirstResult();
  }, 280);
});

document.getElementById('clearSearch').addEventListener('click', () => {
  searchQ = '';
  document.getElementById('searchInput').value = '';
  updateSearchBanner();
  render();
});

function updateSearchBanner() {
  const banner = document.getElementById('searchBanner');
  if (searchQ) {
    const count = EVENTS.filter(ev =>
      ev.name.toLowerCase().includes(searchQ.toLowerCase()) ||
      ev.city.toLowerCase().includes(searchQ.toLowerCase()) ||
      ev.state.toLowerCase().includes(searchQ.toLowerCase())
    ).length;
    document.getElementById('searchBannerText').textContent =
      `${count} event${count !== 1 ? 's' : ''} match "${searchQ}"`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function jumpToFirstResult() {
  const q = searchQ.toLowerCase();
  const hit = EVENTS.find(ev =>
    ev.name.toLowerCase().includes(q) ||
    ev.city.toLowerCase().includes(q) ||
    ev.state.toLowerCase().includes(q)
  );
  if (hit) {
    const d = new Date(hit.date + 'T12:00:00');
    cur = { year: d.getFullYear(), month: d.getMonth() };
  }
}

/* ═══════════════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════════════ */
document.querySelectorAll('[data-att]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-att]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    attFilter = btn.dataset.att;
    render();
  });
});

document.querySelectorAll('[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.type;
    if (typeFilter === t) {
      typeFilter = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
      typeFilter = t;
      btn.classList.add('active');
    }
    render();
  });
});

/* ═══════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════ */
document.getElementById('prevBtn').addEventListener('click', () => {
  if (--cur.month < 0) { cur.month = 11; cur.year--; }
  render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (++cur.month > 11) { cur.month = 0; cur.year++; }
  render();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  cur = { year: TODAY.getFullYear(), month: TODAY.getMonth() };
  render();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft'  && !document.getElementById('overlay').classList.contains('open'))
    document.getElementById('prevBtn').click();
  if (e.key === 'ArrowRight' && !document.getElementById('overlay').classList.contains('open'))
    document.getElementById('nextBtn').click();
});

render();
</script>
